name: Apply SPPG Geofence

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-sppg-geofence.yml

permissions:
  contents: write

jobs:
  apply-geofence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Patch frontend, backend, and migration
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          backend_path = Path('supabase/functions/Absen/index.ts')
          backend = backend_path.read_text(encoding='utf-8')

          old_locations = '''const RADIUS_ABSEN_METER = 70;

const SPPG_LOCATIONS: Record<string, { lat: number; lng: number }> = {
  DARMARAJA: { lat: -6.9186993373214465, lng: 108.07174565889278 },
  CISITU: { lat: -6.889491, lng: 108.044861 },
  TANJUNGMEDAR: { lat: -6.9186993373214465, lng: 108.07174565889278 },
  CIAMIS: { lat: -6.9186993373214465, lng: 108.07174565889278 },
  PAKUALAM: { lat: -6.9186993373214465, lng: 108.07174565889278 },
  CIAWI: { lat: -6.9186993373214465, lng: 108.07174565889278 },
  "CINTA JAYA": { lat: -6.9186993373214465, lng: 108.07174565889278 },
  KIRISIK: { lat: -6.9186993373214465, lng: 108.07174565889278 },
};'''
          new_locations = '''const MAX_RADIUS_ABSEN_METER = 50;
const DEFAULT_LOCATION_KEY = "DEFAULT";

function normalizeSppgLocationKey(value: unknown): string {
  return String(value || "")
    .trim()
    .toUpperCase()
    .replace(/^SPPG[\\s_-]*/, "")
    .replace(/[^A-Z0-9]+/g, "");
}'''
          if old_locations not in backend:
              raise SystemExit('Blok konfigurasi lokasi lama tidak ditemukan')
          backend = backend.replace(old_locations, new_locations, 1)

          old_validation = '''function validasiLokasiSppg(
  sppgUser: string,
  lat: number | null | undefined,
  lng: number | null | undefined,
): { valid: boolean; jarak: number | null; alasan?: string } {
  const titik = SPPG_LOCATIONS[sppgUser];
  if (!titik) return { valid: true, jarak: null, alasan: "SPPG_BELUM_DIATUR" };
  if (lat == null || lng == null) return { valid: false, jarak: null, alasan: "LOKASI_TIDAK_TERSEDIA" };
  const jarak = hitungJarakMeter(titik.lat, titik.lng, lat, lng);
  return { valid: jarak <= RADIUS_ABSEN_METER, jarak: Math.round(jarak) };
}'''
          new_validation = '''type LocationValidationResult = {
  valid: boolean;
  jarak: number | null;
  radius: number;
  namaLokasi: string;
  alasan?: "LOKASI_TIDAK_TERSEDIA" | "KOORDINAT_TIDAK_VALID";
};

async function validasiLokasiSppg(
  sppgUser: string,
  lat: number | null | undefined,
  lng: number | null | undefined,
): Promise<LocationValidationResult> {
  if (lat == null || lng == null) {
    return {
      valid: false,
      jarak: null,
      radius: MAX_RADIUS_ABSEN_METER,
      namaLokasi: sppgUser || "SPPG",
      alasan: "LOKASI_TIDAK_TERSEDIA",
    };
  }

  const latitude = Number(lat);
  const longitude = Number(lng);
  if (
    !Number.isFinite(latitude) || !Number.isFinite(longitude) ||
    latitude < -90 || latitude > 90 || longitude < -180 || longitude > 180
  ) {
    return {
      valid: false,
      jarak: null,
      radius: MAX_RADIUS_ABSEN_METER,
      namaLokasi: sppgUser || "SPPG",
      alasan: "KOORDINAT_TIDAK_VALID",
    };
  }

  const locationKey = normalizeSppgLocationKey(sppgUser);
  const { data: locations, error } = await supabase
    .from("Lokasi_SPPG")
    .select("Kunci_SPPG, Nama_SPPG, Latitude, Longitude, Radius_Meter, Aktif")
    .in("Kunci_SPPG", [locationKey, DEFAULT_LOCATION_KEY])
    .eq("Aktif", true);
  if (error) throw new Error("Gagal membaca konfigurasi lokasi SPPG: " + error.message);

  const titik = (locations || []).find((row: any) => row.Kunci_SPPG === locationKey) ||
    (locations || []).find((row: any) => row.Kunci_SPPG === DEFAULT_LOCATION_KEY);
  if (!titik) throw new Error("Konfigurasi lokasi absensi belum tersedia. Hubungi Admin.");

  const radius = Math.min(
    MAX_RADIUS_ABSEN_METER,
    Math.max(1, Number(titik.Radius_Meter) || MAX_RADIUS_ABSEN_METER),
  );
  const jarak = hitungJarakMeter(
    Number(titik.Latitude),
    Number(titik.Longitude),
    latitude,
    longitude,
  );

  return {
    valid: jarak <= radius,
    jarak: Math.round(jarak),
    radius,
    namaLokasi: String(titik.Nama_SPPG || sppgUser || "SPPG"),
  };
}

function pesanValidasiLokasi(sppgUser: string, hasil: LocationValidationResult): string {
  if (hasil.alasan === "LOKASI_TIDAK_TERSEDIA") {
    return "Lokasi GPS tidak terdeteksi. Aktifkan layanan lokasi dan coba lagi.";
  }
  if (hasil.alasan === "KOORDINAT_TIDAK_VALID") {
    return "Koordinat GPS tidak valid. Muat ulang lokasi dan coba lagi.";
  }
  return `Anda berada di luar radius lokasi SPPG ${sppgUser} (jarak: ${hasil.jarak} meter, maksimal ${hasil.radius} meter).`;
}'''
          if old_validation not in backend:
              raise SystemExit('Fungsi validasi lokasi lama tidak ditemukan')
          backend = backend.replace(old_validation, new_validation, 1)

          record_marker = '''async function recordAbsensiSelf(data: {
  token?: string;
  idUser?: string;
  faceDescriptorScan?: number[];
  lat?: number;
  lng?: number;
}): Promise<unknown> {'''
          check_function = '''async function checkAttendanceLocation(data: {
  token?: string;
  lat?: number;
  lng?: number;
  accuracy?: number;
}): Promise<unknown> {
  const session = await validateSession(data?.token || "");
  if (session.type !== "user" || !session.idUser) {
    throw new ApiError("Akses ditolak. Hanya untuk user yang sudah login.");
  }

  const { data: user, error } = await supabase
    .from("Users")
    .select("ID_User, SPPG")
    .eq("ID_User", session.idUser)
    .maybeSingle();
  if (error || !user) throw new ApiError("User tidak ditemukan");

  const hasil = await validasiLokasiSppg(user.SPPG, data.lat, data.lng);
  if (!hasil.valid) {
    await logAudit(
      "CEK_LOKASI_ABSEN_DITOLAK",
      {
        idUser: session.idUser,
        sppg: user.SPPG,
        jarak: hasil.jarak,
        radius: hasil.radius,
        titikReferensi: hasil.namaLokasi,
        lat: data.lat,
        lng: data.lng,
        accuracy: data.accuracy,
      },
      session.idUser,
    );
    throw new ApiError(pesanValidasiLokasi(user.SPPG, hasil));
  }

  return {
    valid: true,
    jarak: hasil.jarak,
    radius: hasil.radius,
    sppg: user.SPPG,
    titikReferensi: hasil.namaLokasi,
  };
}

async function recordAbsensiSelf(data: {
  token?: string;
  idUser?: string;
  faceDescriptorScan?: number[];
  lat?: number;
  lng?: number;
  accuracy?: number;
}): Promise<unknown> {'''
          if record_marker not in backend:
              raise SystemExit('Marker recordAbsensiSelf tidak ditemukan')
          backend = backend.replace(record_marker, check_function, 1)

          old_record_start = '''  const { idUser: targetIdUser, faceDescriptorScan, lat, lng } = data || {};
  if (!targetIdUser) throw new ApiError("ID User tidak ditemukan");

  const { data: user } = await supabase.from("Users").select("*").eq("ID_User", targetIdUser).maybeSingle();'''
          new_record_start = '''  const { idUser: targetIdUser, faceDescriptorScan, lat, lng, accuracy } = data || {};
  if (!targetIdUser) throw new ApiError("ID User tidak ditemukan");
  if (targetIdUser !== session.idUser) throw new ApiError("Akses ditolak. Identitas absensi tidak sesuai dengan sesi login.");

  const { data: user } = await supabase.from("Users").select("*").eq("ID_User", targetIdUser).maybeSingle();'''
          if old_record_start not in backend:
              raise SystemExit('Awal recordAbsensiSelf tidak ditemukan')
          backend = backend.replace(old_record_start, new_record_start, 1)

          old_location_check = '''  const cekLokasi = validasiLokasiSppg(user.SPPG, lat, lng);
  if (!cekLokasi.valid) {
    const pesanLokasi =
      cekLokasi.alasan === "LOKASI_TIDAK_TERSEDIA"
        ? "Lokasi GPS tidak terdeteksi. Aktifkan layanan lokasi dan coba lagi."
        : `Anda berada di luar radius lokasi SPPG ${user.SPPG} (jarak: ${cekLokasi.jarak} meter, maksimal ${RADIUS_ABSEN_METER} meter).`;
    await logAudit("ABSEN_MANDIRI_DITOLAK_LOKASI", { idUser: targetIdUser, sppg: user.SPPG, jarak: cekLokasi.jarak, lat, lng }, targetIdUser);
    return { success: false, message: pesanLokasi };
  }'''
          new_location_check = '''  const cekLokasi = await validasiLokasiSppg(user.SPPG, lat, lng);
  if (!cekLokasi.valid) {
    const pesanLokasi = pesanValidasiLokasi(user.SPPG, cekLokasi);
    await logAudit(
      "ABSEN_MANDIRI_DITOLAK_LOKASI",
      {
        idUser: targetIdUser,
        sppg: user.SPPG,
        jarak: cekLokasi.jarak,
        radius: cekLokasi.radius,
        titikReferensi: cekLokasi.namaLokasi,
        lat,
        lng,
        accuracy,
      },
      targetIdUser,
    );
    return { success: false, message: pesanLokasi };
  }'''
          if old_location_check not in backend:
              raise SystemExit('Blok pengecekan lokasi recordAbsensiSelf tidak ditemukan')
          backend = backend.replace(old_location_check, new_location_check, 1)

          old_insert_tail = '''      SPPG: user.SPPG,
      ID_Payroll: "",
    });'''
          new_insert_tail = '''      SPPG: user.SPPG,
      ID_Payroll: "",
      Latitude: Number(lat),
      Longitude: Number(lng),
      Akurasi_GPS_Meter: accuracy == null ? null : Number(accuracy),
      Jarak_Lokasi_Meter: cekLokasi.jarak,
      Radius_Maksimum_Meter: cekLokasi.radius,
      Lokasi_SPPG_Referensi: cekLokasi.namaLokasi,
    });'''
          if old_insert_tail not in backend:
              raise SystemExit('Payload insert Absensi mandiri tidak ditemukan')
          backend = backend.replace(old_insert_tail, new_insert_tail, 1)

          old_success_audit = '''    await logAudit("ABSEN_MANDIRI_BERHASIL", { idUser: targetIdUser, jenisAbsen, skor: skorNumServer }, targetIdUser);'''
          new_success_audit = '''    await logAudit(
      "ABSEN_MANDIRI_BERHASIL",
      {
        idUser: targetIdUser,
        jenisAbsen,
        skor: skorNumServer,
        sppg: user.SPPG,
        jarak: cekLokasi.jarak,
        radius: cekLokasi.radius,
        titikReferensi: cekLokasi.namaLokasi,
        accuracy,
      },
      targetIdUser,
    );'''
          if old_success_audit not in backend:
              raise SystemExit('Audit sukses absensi mandiri tidak ditemukan')
          backend = backend.replace(old_success_audit, new_success_audit, 1)

          old_api_item = '''  verifyFaceLiveByIdUser,
  recordAbsensiSelf,'''
          new_api_item = '''  verifyFaceLiveByIdUser,
  checkAttendanceLocation,
  recordAbsensiSelf,'''
          if old_api_item not in backend:
              raise SystemExit('Registry API absensi tidak ditemukan')
          backend = backend.replace(old_api_item, new_api_item, 1)
          backend_path.write_text(backend, encoding='utf-8')

          frontend_path = Path('index.html')
          frontend = frontend_path.read_text(encoding='utf-8')

          old_geolocation = '''function getCurrentPositionPromise(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){resolve(null);return;}
    navigator.geolocation.getCurrentPosition(
      (pos)=>resolve({lat:pos.coords.latitude,lng:pos.coords.longitude}),
      ()=>resolve(null),
      {enableHighAccuracy:true,timeout:8000,maximumAge:0}
    );
  });
}'''
          new_geolocation = '''function getCurrentPositionPromise(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){reject(new Error('Perangkat atau browser ini tidak mendukung layanan lokasi.'));return;}
    navigator.geolocation.getCurrentPosition(
      (pos)=>resolve({
        lat:pos.coords.latitude,
        lng:pos.coords.longitude,
        accuracy:Number.isFinite(pos.coords.accuracy)?Math.round(pos.coords.accuracy):null
      }),
      (error)=>{
        const message=error?.code===1
          ?'Izin lokasi ditolak. Aktifkan izin lokasi untuk aplikasi ini.'
          :error?.code===2
            ?'Lokasi GPS tidak tersedia. Aktifkan GPS dan coba lagi.'
            :error?.code===3
              ?'Pencarian lokasi terlalu lama. Pastikan GPS aktif lalu coba lagi.'
              :'Gagal membaca lokasi GPS.';
        reject(new Error(message));
      },
      {enableHighAccuracy:true,timeout:15000,maximumAge:0}
    );
  });
}'''
          if old_geolocation not in frontend:
              raise SystemExit('Fungsi geolocation frontend tidak ditemukan')
          frontend = frontend.replace(old_geolocation, new_geolocation, 1)

          old_open_check = '''    $('#absen-facecam-status').textContent='Mendeteksi lokasi Anda...';
    AbsenScanState.coords=await getCurrentPositionPromise();
    $('#absen-facecam-status').textContent='Posisikan wajah di dalam bingkai';
    absenScanDetectLoop();'''
          new_open_check = '''    $('#absen-facecam-status').textContent='Mendeteksi lokasi Anda...';
    AbsenScanState.coords=await getCurrentPositionPromise();
    $('#absen-facecam-status').textContent='Memvalidasi radius lokasi SPPG...';
    const locationCheck=await apiCall('checkAttendanceLocation',{
      token:AppState.token,
      lat:AbsenScanState.coords.lat,
      lng:AbsenScanState.coords.lng,
      accuracy:AbsenScanState.coords.accuracy
    });
    if(!locationCheck?.valid)throw new Error(locationCheck?.message||'Lokasi Anda tidak memenuhi radius absensi.');
    $('#absen-facecam-status').textContent=`Lokasi valid (${locationCheck.jarak??0} m). Posisikan wajah di dalam bingkai`;
    absenScanDetectLoop();'''
          if old_open_check not in frontend:
              raise SystemExit('Pengecekan lokasi saat buka scan tidak ditemukan')
          frontend = frontend.replace(old_open_check, new_open_check, 1)

          old_camera_error = '''    $('#absen-facecam-status').textContent=err&&err.name==='NotAllowedError' ? 'Izin kamera ditolak. Aktifkan akses kamera untuk melanjutkan.' : 'Gagal mengakses kamera.';'''
          new_camera_error = '''    $('#absen-facecam-status').textContent=err&&err.name==='NotAllowedError'
      ?'Izin kamera ditolak. Aktifkan akses kamera untuk melanjutkan.'
      :(err&&err.message?err.message:'Gagal mengakses kamera atau lokasi.');'''
          if old_camera_error not in frontend:
              raise SystemExit('Pesan error scan tidak ditemukan')
          frontend = frontend.replace(old_camera_error, new_camera_error, 1)

          old_payload = '''      lat:AbsenScanState.coords?AbsenScanState.coords.lat:null,
      lng:AbsenScanState.coords?AbsenScanState.coords.lng:null
    });'''
          new_payload = '''      lat:AbsenScanState.coords?AbsenScanState.coords.lat:null,
      lng:AbsenScanState.coords?AbsenScanState.coords.lng:null,
      accuracy:AbsenScanState.coords?AbsenScanState.coords.accuracy:null
    });'''
          if old_payload not in frontend:
              raise SystemExit('Payload koordinat frontend tidak ditemukan')
          frontend = frontend.replace(old_payload, new_payload, 1)
          frontend_path.write_text(frontend, encoding='utf-8')

          migration_path = Path('supabase/migrations/20260724094500_add_sppg_geofence.sql')
          migration_path.parent.mkdir(parents=True, exist_ok=True)
          migration_path.write_text('''-- Konfigurasi geofence absensi per SPPG.
create table if not exists public."Lokasi_SPPG" (
  "Kunci_SPPG" text primary key,
  "Nama_SPPG" text not null,
  "Latitude" double precision not null check ("Latitude" between -90 and 90),
  "Longitude" double precision not null check ("Longitude" between -180 and 180),
  "Radius_Meter" integer not null default 50 check ("Radius_Meter" between 1 and 50),
  "Aktif" boolean not null default true,
  "Catatan" text,
  "Updated_At" timestamptz not null default now()
);

alter table public."Lokasi_SPPG" enable row level security;
revoke all on table public."Lokasi_SPPG" from anon, authenticated;
grant select, insert, update, delete on table public."Lokasi_SPPG" to service_role;

insert into public."Lokasi_SPPG"
  ("Kunci_SPPG", "Nama_SPPG", "Latitude", "Longitude", "Radius_Meter", "Aktif", "Catatan")
values
  ('DEFAULT', 'Titik sementara SPPG lainnya', -6.918830336350318, 108.07180419931578, 50, true, 'Sementara menggunakan titik SPPG DARMARAJA'),
  ('DARMARAJA', 'DARMARAJA', -6.918830336350318, 108.07180419931578, 50, true, 'Titik resmi yang diberikan'),
  ('TANJUNGMEDAR', 'TANJUNGMEDAR', -6.7313375247490645, 107.88037420565516, 50, true, 'Titik resmi yang diberikan'),
  ('CIAMIS', 'CIAMIS', -6.918830336350318, 108.07180419931578, 50, true, 'Titik sementara sama dengan DARMARAJA'),
  ('CIAWI', 'CIAWI', -6.918830336350318, 108.07180419931578, 50, true, 'Titik sementara sama dengan DARMARAJA'),
  ('CINTAJAYA', 'CINTA JAYA', -6.918830336350318, 108.07180419931578, 50, true, 'Titik sementara sama dengan DARMARAJA'),
  ('CISITU', 'CISITU', -6.918830336350318, 108.07180419931578, 50, true, 'Titik sementara sama dengan DARMARAJA'),
  ('KIRISIK', 'KIRISIK', -6.918830336350318, 108.07180419931578, 50, true, 'Titik sementara sama dengan DARMARAJA'),
  ('PAKUALAM', 'PAKUALAM', -6.918830336350318, 108.07180419931578, 50, true, 'Titik sementara sama dengan DARMARAJA')
on conflict ("Kunci_SPPG") do update set
  "Nama_SPPG" = excluded."Nama_SPPG",
  "Latitude" = excluded."Latitude",
  "Longitude" = excluded."Longitude",
  "Radius_Meter" = excluded."Radius_Meter",
  "Aktif" = excluded."Aktif",
  "Catatan" = excluded."Catatan",
  "Updated_At" = now();

alter table public."Absensi"
  add column if not exists "Latitude" double precision,
  add column if not exists "Longitude" double precision,
  add column if not exists "Akurasi_GPS_Meter" double precision,
  add column if not exists "Jarak_Lokasi_Meter" integer,
  add column if not exists "Radius_Maksimum_Meter" integer,
  add column if not exists "Lokasi_SPPG_Referensi" text;

comment on table public."Lokasi_SPPG" is 'Konfigurasi titik koordinat dan radius maksimum absensi per SPPG.';
comment on column public."Absensi"."Jarak_Lokasi_Meter" is 'Jarak hasil perhitungan Haversine antara GPS pengguna dan titik SPPG saat absensi.';
''', encoding='utf-8')
          PY

      - name: Commit applied changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-sppg-geofence.yml
          git add index.html supabase/functions/Absen/index.ts supabase/migrations/20260724094500_add_sppg_geofence.sql
          git commit -m "feat: enforce 50m attendance geofence per SPPG"
          git push origin main
